name: Daily Update by 23f2005177@ds.study.iitm.ac.in

on:
  schedule:
    - cron: '0 22 * * *'  # Runs daily at 10 PM UTC (pick any specific time, e.g., 22:00)
  workflow_dispatch:      # Lets you test manually

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update status file by 23f2005177@ds.study.iitm.ac.in
        run: |
          echo "$(date): Daily automated update ran successfully." >> STATUS.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add STATUS.md
          git commit -m "Daily update: $(date)"
          git push
