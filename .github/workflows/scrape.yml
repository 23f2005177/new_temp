name: Table Scraper - 23f2005177@ds.study.iitm.ac.in

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Manual trigger button

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run scraper (23f2005177@ds.study.iitm.ac.in)
      run: npm run scrape
      
    - name: Upload logs if failed
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: scraper-logs
        path: |
          *.log
