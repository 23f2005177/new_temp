name: Daily Commit by 23f2005177@ds.study.iitm.ac.in

on:
  schedule:
    - cron: '0 22 * * *'  # Runs daily at 10 PM UTC (pick specific hour/minute, e.g., 22:00—no wildcards for hour/min)
  workflow_dispatch:  # Lets you trigger manually for testing

jobs:
  daily-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update status file by 23f2005177@ds.study.iitm.ac.in
        run: |
          echo "Daily update: $(date -u)" > status.txt
          git config user.name "Daily Bot"
          git config user.email "23f2005177@ds.study.iitm.ac.in"
          git add status.txt
          git diff --staged --quiet || git commit -m "Daily automated update - $(date -u)"
          git push
