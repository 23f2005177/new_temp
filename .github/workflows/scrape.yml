name: Table Scraper - 23f2005177@ds.study.iitm.ac.in

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright Browsers  # ← ADD THIS STEP
      run: npx playwright install --with-deps chromium
      
    - name: Run scraper (23f2005177@ds.study.iitm.ac.in)  # ← Email in step name ✓
      run: npm run scrape
